<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis SCADA - Operator Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #000000;
            color: #f5f5f7;
        }
        .apple-blur {
            background: rgba(22, 22, 23, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }
        .apple-border {
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .apple-input {
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f5f5f7;
            transition: all 0.2s ease-in-out;
        }
        .apple-input:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background-color: rgba(255, 255, 255, 0.08);
            outline: none;
        }
        .apple-btn {
            background-color: #ffffff;
            color: #000000;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .apple-btn:hover {
            background-color: #e8e8ed;
            transform: scale(0.99);
        }
        .apple-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 select-none">
    <div class="w-full max-w-md apple-blur apple-border rounded-2xl p-10 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-semibold tracking-tight text-white mb-2">Aegis SCADA</h1>
            <p class="text-sm text-[#86868b] tracking-normal font-light">Version 2.0.0 — Secure Control Terminal</p>
        </div>
        
        {% if error %}
        <div class="bg-red-500/10 border border-red-500/30 text-red-200 text-xs px-4 py-3 rounded-lg mb-6 text-center font-light">
            {{ error }}
        </div>
        {% endif %}
        
        <form action="/login" method="POST" class="space-y-6">
            
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-[#86868b] mb-2" for="username">Operator ID</label>
                <input class="w-full apple-input rounded-lg px-4 py-3 text-sm" type="text" id="username" name="username" placeholder="Enter operator name" required autocomplete="username">
            </div>
            
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-[#86868b] mb-2" for="password">Access Token</label>
                <input class="w-full apple-input rounded-lg px-4 py-3 text-sm" type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
            </div>
            
            <div class="border-t border-white/5 pt-5">
                <label class="block text-xs font-semibold uppercase tracking-wider text-[#86868b] mb-3">Control Station Coordinates</label>
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <span class="block text-[10px] text-[#86868b] font-medium mb-1 text-center">X COORD</span>
                        <input class="w-full apple-input rounded-lg px-2 py-2 text-sm text-center" type="number" step="any" name="coord_x" placeholder="0.0" value="12.4" required>
                    </div>
                    <div>
                        <span class="block text-[10px] text-[#86868b] font-medium mb-1 text-center">Y COORD</span>
                        <input class="w-full apple-input rounded-lg px-2 py-2 text-sm text-center" type="number" step="any" name="coord_y" placeholder="0.0" value="-48.1" required>
                    </div>
                    <div>
                        <span class="block text-[10px] text-[#86868b] font-medium mb-1 text-center">Z COORD</span>
                        <input class="w-full apple-input rounded-lg px-2 py-2 text-sm text-center" type="number" step="any" name="coord_z" placeholder="0.0" value="3.5" required>
                    </div>
                </div>
            </div>
            
            <button class="w-full apple-btn py-3 rounded-lg text-sm tracking-wide shadow-md mt-2" type="submit">
                Access Terminal
            </button>
        </form>
    </div>
</body>
</html>
