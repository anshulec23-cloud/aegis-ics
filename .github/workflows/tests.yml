name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/api/requirements.txt
          pip install -r version-two/requirements.txt

      - name: Run unit tests (Version 1)
        run: python -m unittest discover -s tests

      - name: Run unit tests (Version 2)
        run: python -m unittest discover -s version-two
